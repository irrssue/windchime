<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta name="description" content="A wind chime with real physics. Gusts drift by, the sail catches them, and the clapper only rings a tube when it actually strikes one.">

  <meta property="og:title" content="Windchime">

<body>
<div class="stage" id="stage">

  <!-- paper texture -->
  <svg id="paper" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;pointer-events:none;mix-blend-mode:multiply;opacity:0.55;z-index:1;">
    <defs>
      <filter id="paperNoise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"></feTurbulence><feColorMatrix type="matrix" values="0 0 0 0 0.30  0 0 0 0 0.26  0 0 0 0 0.18  0 0 0 0.05 0"></feColorMatrix></filter>
    </defs>
    <rect width="100%" height="100%" filter="url(#paperNoise)"></rect>
  </svg>
  <!-- warm vignette -->
  <div style="position:absolute;inset:0;pointer-events:none;z-index:2;background:radial-gradient(120% 90% at 50% 42%, rgba(255,250,238,0.55), rgba(232,222,201,0) 55%, rgba(120,105,78,0.10) 100%);"></div>

  <!-- the chime -->
  <canvas id="scene-canvas"></canvas>

  <!-- the only text -->
  <div style="position:absolute;left:0;right:0;bottom:38px;text-align:center;z-index:4;pointer-events:none;">
    <div style="font-size:15px;letter-spacing:0.42em;color:#6b6150;font-weight:500;text-indent:0.42em;font-family:'Times New Roman',Times,serif;">This too shall pass</div>
  </div>

  <!-- transient sound hint -->
  <div id="hint" style="position:absolute;left:0;right:0;bottom:14px;text-align:center;z-index:5;pointer-events:none;transition:opacity 1.4s ease;opacity:0;">
    <div style="font-size:11px;letter-spacing:0.28em;color:#9a8f79;text-transform:uppercase;">move or tap to let the sound in</div>
  </div>

</div>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

(() => {
'use strict';

/* ================================================================
   Physical model
   ----------------------------------------------------------------
   Everything below runs in SI units. A real chime lives in the
   horizontal plane, so the model is 3D: x is the screen axis, z is
   depth toward the viewer.

   Wind      u(t)   2D vector: prevailing flow whose speed relaxes
                    toward a weather target (OU with Gaussian noise)
                    and whose heading holds in strong wind and
                    meanders in light air; (1 - cos) gust envelopes
                    scaled by a gust factor and allowed to veer; plus
                    Kaimal-spectrum turbulence (velocity amplitude
                    ~ f^-5/6) with longitudinal and lateral parts.
   Sail rig  q      spherical pendulum (clapper mass + sail mass),
                    small-angle decoupled x/z modes, driven by vector
                    quadratic aerodynamic drag on the sail:
                      F = 1/2 * rho * Cd * A * |v_rel| * v_rel
                      v_rel = u * cos|q| - L_s * q'
                      I q_i'' = -(m_c L_c + m_s L_s) g sin q_i
                                + F_i * L_s * cos|q| - c q_i'
   Tubes     a_k    hang at azimuth psi_k around the ring; each is a
                    uniform rod pivoted at its top swinging radially:
                      a'' = -(3g / 2L) sin a - c a' + drag along e_k
   Hook rig  thG,p  the whole assembly hangs from a fixed hook and
                    responds to total wind drag two ways: an angular
                    sway (short pendulum, two axes) and a genuine
                    spring-damped translational DOF (px,pz) - the
                    hook cord itself flexing/swinging the whole rig
                    sideways, not just the parts within it swinging.
   Strike           geometric contact: the clapper's displacement
                    toward tube k closes the rest gap (plus however
                    far the tube has swung away). Resolved as a 1-D
                    collision along e_k with effective masses
                      m_eff = I / r^2   (pendulum struck at radius r)
                    and restitution e. Sound volume = impact velocity,
                    so silence is guaranteed unless something moves.
   ================================================================ */

const SCALE = 400;            // px per metre (legacy drawing scale for constants)
const G = 9.81;
const RHO = 1.2;              // air density kg/m^3

// --- geometry constants (metres), shared by physics and meshes ---
const RING_Y = 150;
const L_CLAPPER = (300 - RING_Y) / SCALE;   // 0.375 m, pivot to clapper centre
const L_SAIL    = (510 - RING_Y) / SCALE;   // 0.9 m, pivot to sail centre
const M_CLAPPER = 0.25;      // kg, wooden disk
const M_SAIL    = 0.03;      // kg
const SAIL_AREA = 0.018;     // m^2, generous wind catcher
const CD_SAIL   = 1.2;       // flat-plate-ish drag coefficient
const RING_R    = 0.185;     // m, ring radius (74px / SCALE)
const CLAPPER_R = 0.13;      // m, clapper disk radius (wide, like a real chime)
const TUBE_R    = 0.016;     // m, tube radius

function gauss() {           // Box-Muller: proper Gaussian noise for the wind
  let u = 0; while (!u) u = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * Math.random());
}

// compound pendulum constants for the central assembly
const I_C  = M_CLAPPER * L_CLAPPER ** 2 + M_SAIL * L_SAIL ** 2;
const GRAV_C = (M_CLAPPER * L_CLAPPER + M_SAIL * L_SAIL) * G; // torque coeff
const MEFF_CLAPPER = I_C / L_CLAPPER ** 2; // effective mass at clapper height

// --- tubes ---
// The six tubes hang evenly around the ring; psi is each tube's azimuth in
// the horizontal plane (x = screen, z = depth). freq: fundamental (Hz), an
// E minor pentatonic voicing; a real tube's pitch goes as 1/L^2, which
// these lengths approximate.
const TUBE_SPEC = [
  { i: 0, off: -66, lenPx: 320, py: 156, freq: 164.81, psi: 195 },
  { i: 1, off: -40, lenPx: 275, py: 160, freq: 220.00, psi: 135 },
  { i: 2, off: -14, lenPx: 230, py: 163, freq: 293.66, psi: 255 },
  { i: 3, off:  14, lenPx: 210, py: 163, freq: 329.63, psi:  75 },
  { i: 4, off:  40, lenPx: 250, py: 160, freq: 246.94, psi: 315 },
  { i: 5, off:  66, lenPx: 300, py: 156, freq: 196.00, psi:  15 },
];

const tubes = TUBE_SPEC.map(s => {
  const L = s.lenPx / SCALE;                 // rod length, m
  const m = 0.4 * L;                         // aluminium tube, ~1.5 mm wall
  const I = m * L * L / 3;                   // rod pivoted at end
  const rContact = (300 - s.py) / SCALE;     // contact radius (clapper height)
  const psi = s.psi * Math.PI / 180;
  return {
    ...s,
    L,
    a: 0, av: 0,                             // radial swing angle, angular velocity
    ex: Math.cos(psi), ez: Math.sin(psi),    // outward unit vector e_k
    omega2: 3 * G / (2 * L),                 // (3g/2L): rod pendulum
    meff: I / (rContact * rContact),         // effective mass at contact
    rContact,
    lastHit: -1,
    dragCoef: 0.5 * RHO * 1.1 * (L * TUBE_R * 2) * L / 2 / I, // tube face drag -> ang accel per u|u|
  };
});

// --- state ---
let t = 0;
let qx = 0, qz = 0, wx = 0, wz = 0;  // clapper/sail pendulum: angle + angular velocity per axis
let thGx = 0, wGx = 0, thGz = 0, wGz = 0;   // whole-assembly angular sway (hook string), two axes
let px = 0, pz = 0, vpx = 0, vpz = 0;       // whole-assembly translational sway (hook flex), metres
let thS = 0, wS = 0;      // sail flutter about its own attachment

// --- wind ---
// Kaimal-like turbulence bank: log-spaced frequencies 0.07..3.2 Hz (this
// spans the pendulum's ~0.6 Hz resonance), velocity amplitude ~ f^-5/6,
// normalized so the sum has unit variance. Slightly detuned per component
// so the signal never repeats.
const N_TURB = 7;
const turbF = [], turbA = [], phA = [], phC = [];
for (let i = 0; i < N_TURB; i++) {
  turbF.push(0.07 * Math.pow(3.2 / 0.07, i / (N_TURB - 1)) * (0.9 + Math.random() * 0.2));
  turbA.push(Math.pow(turbF[i], -5 / 6));
  phA.push(Math.random() * 2 * Math.PI);
  phC.push(Math.random() * 2 * Math.PI);
}
{ const s = Math.hypot(...turbA) / Math.SQRT2; for (let i = 0; i < N_TURB; i++) turbA[i] /= s; }
const TI = 0.28;          // turbulence intensity (open suburban terrain ~0.2-0.3)

const WIND = {
  speed: 0.6,             // prevailing speed, m/s
  target: 1.0,            // weather-scale setpoint the speed relaxes toward
  nextWeather: 15 + Math.random() * 20,
  dir: Math.random() * 2 * Math.PI,   // prevailing heading, rad
  gustT: null, gustDur: 0, gustAmp: 0, gustDir: 0,
  nextGust: 1.5 + Math.random() * 3,
  ux: 0, uz: 0,           // instantaneous wind vector, m/s
  mag: 0,                 // |u|
  smooth: 0,              // |u| smoothed, for the wind-noise bed
};

function updateWind(dt) {
  // weather-scale wandering: every ~15-35 s the prevailing speed picks a new
  // setpoint (occasional calm spells), and relaxes toward it as an OU process
  if (t > WIND.nextWeather) {
    WIND.target = Math.random() < 0.25 ? 0.15 + Math.random() * 0.4
                                       : 0.6 + Math.random() * 2.2;
    WIND.nextWeather = t + 15 + Math.random() * 20;
  }
  WIND.speed += (WIND.target - WIND.speed) * 0.08 * dt + 0.22 * Math.sqrt(dt) * gauss();
  if (WIND.speed < 0) WIND.speed = 0;

  // heading: holds steady in strong wind, meanders in light air
  WIND.dir += (0.7 / (0.7 + WIND.speed)) * Math.sqrt(dt) * gauss();

  // gusts: peak scaled by a gust factor on the prevailing speed, smooth
  // (1 - cos) envelope, veering up to ~30 degrees off the mean heading
  if (t > WIND.nextGust) {
    WIND.gustAmp = (0.8 + Math.random() * 1.6) * Math.max(0.9, WIND.speed);
    WIND.gustDir = WIND.dir + (Math.random() - 0.5) * 1.0;
    WIND.gustT = 0;
    WIND.gustDur = 1.5 + Math.random() * 4;
    WIND.nextGust = t + WIND.gustDur + 3 + Math.random() * 9;
  }
  let gust = 0;
  if (WIND.gustT != null && WIND.gustT < WIND.gustDur) {
    WIND.gustT += dt;
    gust = WIND.gustAmp * 0.5 * (1 - Math.cos(2 * Math.PI * Math.min(1, WIND.gustT / WIND.gustDur)));
  }

  // turbulence: longitudinal (along the wind) and lateral (across it, ~75%
  // of the longitudinal energy, per atmospheric boundary-layer measurements)
  let ta = 0, tc = 0;
  for (let i = 0; i < N_TURB; i++) {
    const w = turbF[i] * 2 * Math.PI * dt;
    phA[i] += w; phC[i] += w * 1.13;
    ta += turbA[i] * Math.sin(phA[i]);
    tc += turbA[i] * Math.sin(phC[i]);
  }
  const sigma = TI * (WIND.speed + gust + 0.25);
  ta *= sigma; tc *= sigma * 0.75;

  const dx = Math.cos(WIND.dir), dz = Math.sin(WIND.dir);
  const gx = Math.cos(WIND.gustDir), gz = Math.sin(WIND.gustDir);
  WIND.ux = (WIND.speed + ta) * dx - tc * dz + gust * gx;
  WIND.uz = (WIND.speed + ta) * dz + tc * dx + gust * gz;
  WIND.mag = Math.hypot(WIND.ux, WIND.uz);
  WIND.smooth += (WIND.mag - WIND.smooth) * Math.min(1, 2.5 * dt);
}

// --- dynamics ---
// whole-assembly hook response tuning: MG is the mass "felt" at the hook
// (rig + tubes contribute inertia beyond just the central assembly); KP/CP
// are a spring-damper for the translational sway (cord/hook flex under
// load); tuned so the visible shove settles like a real hung object, not
// a metronome. These are the calibration knobs - adjust to taste.
const MG = 0.6;            // effective assembly mass at the hook, kg
const HOOK_L = 0.25;       // effective short-pendulum length for angular sway, m
const KP = 90;             // translational spring stiffness, N/m (~2 Hz)
const CP = 5.5;            // translational damping, N.s/m

function step(dt) {
  // clapper + sail: spherical pendulum, small-angle decoupled x/z modes,
  // driven by vector quadratic drag on the sail
  const cosQ = Math.cos(Math.hypot(qx, qz));
  const vrx = WIND.ux * cosQ - L_SAIL * wx;
  const vrz = WIND.uz * cosQ - L_SAIL * wz;
  const k = 0.5 * RHO * CD_SAIL * SAIL_AREA * Math.hypot(vrx, vrz);
  const Fx = k * vrx, Fz = k * vrz;    // F = 1/2 rho Cd A |v_rel| v_rel

  // assembly translational acceleration: integrated below for px,pz, and
  // also the inertial forcing every pendulum hung from the moving ring
  // feels (an accelerating pivot tilts effective gravity) - this coupling
  // is what makes the tubes visibly lag the ring when a gust shoves it
  const axA = (Fx - KP * px) / MG - CP * vpx;
  const azA = (Fz - KP * pz) / MG - CP * vpz;

  // damping: small linear term (pivot friction) plus quadratic form drag
  // of clapper and cords, which barely touches light-air motion but caps
  // large-amplitude swings the way real air resistance does
  wx += ((-GRAV_C * Math.sin(qx) + Fx * L_SAIL * cosQ - (GRAV_C / G) * axA * Math.cos(qx)) / I_C
         - 0.12 * wx - 1.0 * wx * Math.abs(wx)) * dt;
  wz += ((-GRAV_C * Math.sin(qz) + Fz * L_SAIL * cosQ - (GRAV_C / G) * azA * Math.cos(qz)) / I_C
         - 0.12 * wz - 1.0 * wz * Math.abs(wz)) * dt;
  qx += wx * dt;
  qz += wz * dt;

  // whole-assembly angular sway: short pendulum from the hook, two axes,
  // each pushed by the drag component along its axis
  const alphaGx = -(G / HOOK_L) * Math.sin(thGx) - 1.6 * wGx + Fx / (MG * HOOK_L);
  wGx += alphaGx * dt;
  thGx += wGx * dt;
  thGx = Math.max(-0.09, Math.min(0.09, thGx));

  const alphaGz = -(G / HOOK_L) * Math.sin(thGz) - 1.6 * wGz + Fz / (MG * HOOK_L);
  wGz += alphaGz * dt;
  thGz += wGz * dt;
  thGz = Math.max(-0.09, Math.min(0.09, thGz));

  // whole-assembly translational sway: the hook cord itself flexes under
  // total wind load, a spring-damped mass pushed by the same drag force -
  // this is what makes the entire rig visibly shove sideways in a gust,
  // not just the parts hung within it
  vpx += axA * dt;
  px += vpx * dt;
  vpz += azA * dt;
  pz += vpz * dt;

  // sail flutter about its own hinge (light, high frequency, buffeting kick;
  // noise scales with sqrt(dt) so its energy is timestep-independent)
  const alphaS = -55 * Math.sin(thS) - 4 * wS + 0.9 * vrx * Math.abs(vrx);
  wS += alphaS * dt + 0.35 * Math.sqrt(dt) * gauss() * Math.min(3, WIND.mag);
  thS += wS * dt;
  thS = Math.max(-0.18, Math.min(0.18, thS));

  // tubes: rod pendulums swinging radially, each driven by the wind
  // component along its own azimuth
  for (const tb of tubes) {
    const uk = WIND.ux * tb.ex + WIND.uz * tb.ez;
    const aK = axA * tb.ex + azA * tb.ez;   // pivot acceleration along e_k
    const aTube = -tb.omega2 * Math.sin(tb.a) - 0.9 * tb.av
                + tb.dragCoef * uk * Math.abs(uk)
                - (tb.omega2 / G) * aK * Math.cos(tb.a);
    tb.av += aTube * dt;
    tb.a += tb.av * dt;
    tb.a = Math.max(-0.35, Math.min(0.35, tb.a));   // safety only, physics stays well inside
  }

  checkStrikes();
}

// collision: the clapper edge reaches a tube when its displacement toward
// that tube's azimuth closes the rest gap (plus however far the tube has
// swung away). Resolved as a 1-D collision along e_k.
const RESTITUTION = 0.35;   // wood on aluminium, fairly dead
// clapper edge to tube face at rest, from the actual geometry, so the
// strike happens exactly where the eye sees contact
const GAP = RING_R - TUBE_R - CLAPPER_R;   // 0.049 m
function checkStrikes() {
  // clapper centre displacement and velocity at contact height (m, m/s)
  const dxp = L_CLAPPER * Math.sin(qx), dzp = L_CLAPPER * Math.sin(qz);
  const vxp = L_CLAPPER * Math.cos(qx) * wx, vzp = L_CLAPPER * Math.cos(qz) * wz;
  for (const tb of tubes) {
    const dk = dxp * tb.ex + dzp * tb.ez;               // displacement toward tube
    const reach = GAP + tb.rContact * Math.sin(tb.a);   // tube face, swings away
    if (dk < reach || t - tb.lastHit < 0.12) continue;

    const vClap = vxp * tb.ex + vzp * tb.ez;
    const vTube = tb.rContact * Math.cos(tb.a) * tb.av;
    const approach = vClap - vTube;
    if (approach <= 0.01) continue;   // grazing or separating: no sound

    // impulse exchange with effective masses and restitution
    const m1 = MEFF_CLAPPER, m2 = tb.meff;
    const dv1 = -(1 + RESTITUTION) * m2 / (m1 + m2) * approach;
    const dv2 =  (1 + RESTITUTION) * m1 / (m1 + m2) * approach;
    wx += dv1 * tb.ex / L_CLAPPER;
    wz += dv1 * tb.ez / L_CLAPPER;
    tb.av += dv2 / tb.rContact;
    tb.lastHit = t;

    // loudness tracks impact speed; this rig peaks near 0.35 m/s at contact
    strike(tb.freq, Math.min(1, Math.max(0.08, approach * 2.8)));
  }
}

/* ================================================================
   Audio - modal synthesis. Overtone ratios 1 : 2.76 : 5.40 : 8.93
   are the transverse modes of an ideal free-free bar, which is what
   a chime tube is acoustically.
   ================================================================ */
let actx = null, chimeBus = null, windGain = null;

function initAudio() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC || actx) return;
  try { actx = new AC(); } catch (e) { return; }

  const master = actx.createGain();
  master.gain.value = 0.85;
  master.connect(actx.destination);

  // gentle reverb tail
  const conv = actx.createConvolver();
  conv.buffer = makeImpulse(2.6, 2.4);
  const wet = actx.createGain(); wet.gain.value = 0.5;
  conv.connect(wet); wet.connect(master);

  chimeBus = actx.createGain(); chimeBus.gain.value = 0.5;
  chimeBus.connect(master);
  chimeBus.connect(conv);

  // soft wind bed, gain follows measured wind speed
  windGain = actx.createGain(); windGain.gain.value = 0;
  const wlp = actx.createBiquadFilter();
  wlp.type = 'lowpass'; wlp.frequency.value = 470; wlp.Q.value = 0.4;
  const src = actx.createBufferSource();
  src.buffer = makeNoise(4); src.loop = true;
  src.connect(wlp); wlp.connect(windGain); windGain.connect(master);
  src.start();
}

function makeImpulse(dur, decay) {
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(2, n, actx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, decay);
  }
  return buf;
}

function makeNoise(dur) {
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < n; i++) {
    const w = Math.random() * 2 - 1;
    last = (last + 0.02 * w) / 1.02;
    d[i] = last * 3.2;
  }
  return buf;
}

function strike(freq, vol) {
  if (!actx || actx.state !== 'running') return;
  const now = actx.currentTime;
  const ratios = [1, 2.76, 5.40, 8.93];
  const amps = [1, 0.5, 0.26, 0.12];
  const durs = [5.5, 3.0, 1.8, 1.0];
  const lp = actx.createBiquadFilter();
  lp.type = 'lowpass';
  // harder hits are brighter: filter opens with impact velocity
  lp.frequency.value = 2800 + 3200 * vol;
  lp.connect(chimeBus);
  ratios.forEach((r, i) => {
    const o = actx.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq * r * (1 + (Math.random() - 0.5) * 0.004);
    const e = actx.createGain();
    const peak = vol * amps[i] * 0.42;
    e.gain.setValueAtTime(0.0001, now);
    e.gain.linearRampToValueAtTime(peak, now + 0.005);
    e.gain.exponentialRampToValueAtTime(0.0001, now + durs[i]);
    o.connect(e); e.connect(lp);
    o.start(now); o.stop(now + durs[i] + 0.05);
  });
}

/* ================================================================
   3D scene - Three.js
   ----------------------------------------------------------------
   Pivot hierarchy mirrors the physics exactly, one node per DOF:

     scene
     └ gAssembly (hook knot at origin)
       │   translation px,pz + rotation thGx,thGz (whole-rig hook sway)
       ├ six suspension cords fanning from the knot to the ring rim
       ├ ring (y = -DROP) + gTubePivot[k] on the rim (rotate Y by psi)
       │     └ gTubeSwing[k]  (rotate by tube.a: hanger string + tube
       │                       swing radially in their azimuth plane)
       └ gCentral (pivot at ring centre)
           rotation qz about X, -qx about Z (spherical pendulum)
         └ clapper disk, string to sail
           └ gSail  rotation thS (flutter about its hinge)
   ================================================================ */

const canvas = document.getElementById('scene-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
// metals are black without something to reflect: neutral studio environment
scene.environment = new THREE.PMREMGenerator(renderer).fromScene(new RoomEnvironment()).texture;

const DROP = 0.30;   // hook knot down to ring plane, m

const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 50);
camera.position.set(0, -0.10, 2.75);
camera.lookAt(0, -0.66, 0);

// lights: warm key from upper-left, soft hemisphere fill; the environment
// map above carries the metal reflections
const hemi = new THREE.HemisphereLight(0xfff4e0, 0x40352a, 0.35);
scene.add(hemi);
const key = new THREE.DirectionalLight(0xffe8c0, 0.9);
key.position.set(-1.1, 1.4, 1.0);
scene.add(key);
const fill = new THREE.DirectionalLight(0xcdd7e0, 0.2);
fill.position.set(1.0, 0.3, 0.6);
scene.add(fill);

// materials: warm bronze-aluminium tubes, dark wood, waxed cord
const matTube = new THREE.MeshStandardMaterial({ color: 0x8d7f68, metalness: 0.85, roughness: 0.32 });
const matWood = new THREE.MeshStandardMaterial({ color: 0x6b563f, metalness: 0.0, roughness: 0.7 });
const matSail = new THREE.MeshStandardMaterial({ color: 0x584732, metalness: 0.0, roughness: 0.85 });
const matString = new THREE.MeshStandardMaterial({ color: 0x2b2721, metalness: 0.0, roughness: 0.9 });
const matRing = new THREE.MeshStandardMaterial({ color: 0x9a8c72, metalness: 0.9, roughness: 0.28 });

function stringMesh(len) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(0.0012, 0.0012, len, 5), matString);
  m.position.y = -len / 2;
  return m;
}

// straight cord between two points in the parent's local frame
const Y_UP = new THREE.Vector3(0, 1, 0);
function cord(ax, ay, az, bx, by, bz) {
  const a = new THREE.Vector3(ax, ay, az);
  const d = new THREE.Vector3(bx - ax, by - ay, bz - az);
  const m = new THREE.Mesh(new THREE.CylinderGeometry(0.0012, 0.0012, d.length(), 5), matString);
  m.position.copy(a).addScaledVector(d, 0.5);
  m.quaternion.setFromUnitVectors(Y_UP, d.normalize());
  return m;
}

// --- whole assembly, hung from the hook at the origin ---
const gAssembly = new THREE.Group();
scene.add(gAssembly);

// hook knot, six suspension cords fanning to the ring rim, central cord
gAssembly.add(new THREE.Mesh(new THREE.SphereGeometry(0.007, 12, 12), matWood));
gAssembly.add(cord(0, 0, 0, 0, 0.5, 0));   // up to whatever holds it, off-frame
for (const tb of tubes) {
  const psi = tb.psi * Math.PI / 180;
  gAssembly.add(cord(0, 0, 0, RING_R * Math.cos(psi), -DROP, RING_R * Math.sin(psi)));
}
gAssembly.add(cord(0, 0, 0, 0, -DROP, 0));

// ring
const ring = new THREE.Mesh(new THREE.TorusGeometry(RING_R, 0.005, 12, 64), matRing);
ring.rotation.x = Math.PI / 2;
ring.position.y = -DROP;
gAssembly.add(ring);

// tubes, each on a visible hanger string from the ring rim, pre-rotated to
// its azimuth psi then swinging radially in its own plane
const tubeGroups = tubes.map(tb => {
  const psi = tb.psi * Math.PI / 180;
  const gPivot = new THREE.Group();
  gPivot.position.set(RING_R * Math.cos(psi), -DROP, RING_R * Math.sin(psi));
  gPivot.rotation.y = -psi;             // local +x now points radially outward (ex,ez)
  gAssembly.add(gPivot);

  const gSwing = new THREE.Group();
  gPivot.add(gSwing);

  const hang = (tb.py - RING_Y) / SCALE + 0.02;   // hanger string, per-tube height
  gSwing.add(stringMesh(hang));
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(TUBE_R, TUBE_R, tb.L, 24), matTube);
  mesh.position.y = -hang - tb.L / 2;
  gSwing.add(mesh);

  return gSwing;
});

// central assembly: pivot at the ring centre, string down to the wide
// wooden clapper disk, then on down to the sail
const gCentral = new THREE.Group();
gCentral.position.y = -DROP;
gAssembly.add(gCentral);
gCentral.add(stringMesh(L_CLAPPER));

const clapper = new THREE.Mesh(new THREE.CylinderGeometry(CLAPPER_R, CLAPPER_R, 0.02, 48), matWood);
clapper.position.y = -L_CLAPPER;
gCentral.add(clapper);

gCentral.add((() => { const s = stringMesh(L_SAIL - L_CLAPPER); s.position.y = -L_CLAPPER; return s; })());

// sail, hinged at its attachment point so thS flutter reads as a rotation there
const gSail = new THREE.Group();
gSail.position.y = -L_SAIL;
gCentral.add(gSail);

// classic vertical wooden sail disk, area = SAIL_AREA
const sailR = Math.sqrt(SAIL_AREA / Math.PI);
const sail = new THREE.Mesh(new THREE.CylinderGeometry(sailR, sailR, 0.008, 36), matSail);
sail.rotation.x = Math.PI / 2;   // stand the disk vertical, face into the wind
sail.position.y = -sailR;
gSail.add(sail);

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

/* ================================================================
   Interaction + render loop
   ================================================================ */
const hint = document.getElementById('hint');

function wake() {
  initAudio();
  if (actx && actx.state !== 'running') actx.resume().catch(() => {});
  if (hint) hint.style.opacity = '0';
}
['pointerdown', 'keydown', 'touchstart'].forEach(ev =>
  window.addEventListener(ev, wake, { passive: true }));
setTimeout(() => {
  if ((!actx || actx.state !== 'running') && hint) hint.style.opacity = '1';
}, 1200);

// pointer movement only unlocks audio (browser autoplay policy); it is not wind
window.addEventListener('pointermove', wake, { passive: true });

// the physics runs on a fixed substep; the screen refreshes whenever it
// likes. Rendering the raw last substep aliases the two clocks against
// each other and reads as judder, so render() blends the two most recent
// physics states at the exact fraction the frame falls between them.
function snap() {
  return { px, pz, thGx, thGz, qx, qz, thS, a: tubes.map(tb => tb.a) };
}
let S0 = snap(), S1 = snap();

function render(f) {
  const s = (k) => S0[k] + (S1[k] - S0[k]) * f;

  // whole-assembly hook sway: real translation + two-axis rotation, both
  // driven by the same drag force the tubes and sail feel
  gAssembly.position.x = s('px');
  gAssembly.position.z = s('pz');
  gAssembly.rotation.set(s('thGz'), 0, -s('thGx'));

  // clapper/sail spherical pendulum, both axes (not just the screen axis)
  gCentral.rotation.set(s('qz'), 0, -s('qx'));

  // sail flutter about its own hinge
  const th = s('thS');
  gSail.rotation.x = th * 0.6;
  gSail.rotation.z = th;

  // each tube swings radially outward/inward in its own azimuth plane
  for (let i = 0; i < tubes.length; i++) {
    tubeGroups[i].rotation.z = -(S0.a[i] + (S1.a[i] - S0.a[i]) * f);
  }

  if (windGain && actx) {
    windGain.gain.setTargetAtTime(Math.min(0.06, WIND.smooth * 0.012), actx.currentTime, 0.4);
  }

  renderer.render(scene, camera);
}

// fixed-substep semi-implicit Euler keeps stiff springs stable
const SUBSTEP = 1 / 240;
let acc = 0, last = performance.now();
function tick(now) {
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.1) dt = 0.1;   // tab was hidden: don't explode
  acc += dt;
  while (acc >= SUBSTEP) {
    t += SUBSTEP;
    updateWind(SUBSTEP);
    step(SUBSTEP);
    S0 = S1;
    S1 = snap();
    acc -= SUBSTEP;
  }
  render(acc / SUBSTEP);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

})();
</script>
</body>
</html>
